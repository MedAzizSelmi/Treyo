# ===================================================================
# BYB MATCH BACKEND - APPLICATION CONFIGURATION
# ===================================================================

# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
server.port=8085
server.error.include-message=always
server.error.include-stacktrace=never

# ===================================================================
# DATABASE CONFIGURATION (PostgreSQL)
# ===================================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/Matching
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ===================================================================
# FILE UPLOAD CONFIGURATION
# ===================================================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# ===================================================================
# JWT CONFIGURATION
# ===================================================================
jwt.secret=your-256-bit-secret-change-this-in-production-make-it-very-long-and-random
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ===================================================================
# ML SERVICE CONFIGURATION (FastAPI)
# ===================================================================
ml.service.url=http://localhost:8000
ml.service.endpoints.recommendations=/recommendations/{studentId}
ml.service.endpoints.cold-start=/recommendations/cold-start
ml.service.endpoints.track-interaction=/interactions/track
ml.service.endpoints.trending=/courses/trending
ml.service.endpoints.explain=/recommendations/explain

# ===================================================================
# CORS CONFIGURATION
# ===================================================================
cors.allowed-origins=http://localhost:3000,http://localhost:19006,http://localhost:8081
cors.allowed-methods=GET,POST,PUT,DELETE,PATCH
cors.allowed-headers=*
cors.exposed-headers=Authorization
cors.allow-credentials=true

# ===================================================================
# LOGGING
# ===================================================================
logging.level.root=INFO
logging.level.com.byb.match=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===================================================================
# API DOCUMENTATION (Swagger)
# ===================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha

# ===================================================================
# APPLICATION INFO
# ===================================================================
spring.application.name=byb-match-backend
info.app.name=BYB Match Backend
info.app.description=AI-powered trainer-student matching platform
info.app.version=1.0.0

# ===================================================================
# GEMINI AI CONFIGURATION
# ===================================================================
gemini.api.key=AIzaSyBLIG2rdxiLQDycH4tSJEIJx3p-QinF_cA
